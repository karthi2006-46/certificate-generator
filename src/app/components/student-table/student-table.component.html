<div class="student-table-container">
  <div class="table-header">
    <h3>Student Records</h3>
    <div class="search-box">
      <input
        type="text"
        placeholder="Search students..."
        [(ngModel)]="searchText"
        (input)="filterData()"
        class="form-input"
      />
    </div>
  </div>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort class="students-table">
      <!-- Selection Column -->
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef>
          <input
            type="checkbox"
            (change)="toggleSelectAll($event)"
            [checked]="selectedRows.size === dataSource.filteredData.length && selectedRows.size > 0"
          />
        </th>
        <td mat-cell *matCellDef="let element; let i = index">
          <input
            type="checkbox"
            (change)="toggleSelection(i)"
            [checked]="isSelected(i)"
          />
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Student Name</th>
        <td mat-cell *matCellDef="let element">{{ element.fullName }}</td>
      </ng-container>

      <!-- Registration Number Column -->
      <ng-container matColumnDef="registration_Number">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Registration No</th>
        <td mat-cell *matCellDef="let element">{{ element.registration_Number }}</td>
      </ng-container>

      <!-- Domain Column -->
      <ng-container matColumnDef="domain_Name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Domain</th>
        <td mat-cell *matCellDef="let element">{{ element.domain_Name }}</td>
      </ng-container>

      <!-- Start Date Column -->
      <ng-container matColumnDef="starting_Date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Start Date</th>
        <td mat-cell *matCellDef="let element">{{ element.starting_Date }}</td>
      </ng-container>

      <!-- End Date Column -->
      <ng-container matColumnDef="ending_Date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>End Date</th>
        <td mat-cell *matCellDef="let element">{{ element.ending_Date }}</td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <div class="actions">
            <button class="btn-icon" title="Preview" matTooltip="Preview Student Details">
              👁️
            </button>
            <button class="btn-icon" title="Generate" matTooltip="Generate Document">
              📄
            </button>
            <button class="btn-icon" title="Download" matTooltip="Download PDF">
              ⬇️
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.selected]="isSelected(row)" (click)="toggleSelection(row)"></tr>
    </table>
  </div>

  <mat-paginator
    [pageSizeOptions]="[10, 25, 50]"
    showFirstLastButtons
    aria-label="Select page of students"
  ></mat-paginator>
</div>
